<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Local Travel Agency</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header>
    <h1>🌴 DAM Travels</h1>
    <nav>
        <a href="#trips">Trips</a>
        <a href="#booking">Booking</a>
    </nav>
</header>

<!-- HERO -->
<section class="hero">
    <h2>Explore Sri Lanka With Us</h2>
    <p>Affordable • Comfortable • Trusted</p>
</section>

<!-- TRIPS SECTION -->
<section id="trips">
    <h2>Available Trips</h2>

    <div class="trip-container" id="tripList">
        <!-- Trips loaded by JS -->
    </div>
</section>

<!-- BOOKING SECTION -->
<section id="booking">
    <h2>Book Your Trip</h2>

    <form id="bookingForm">
        <input type="text" id="name" placeholder="Your Name">
        <input type="tel" id="phone" placeholder="Phone Number">

        <select id="trip">
            <option value="">Select Trip</option>
        </select>

        <input type="date" id="date">

        <button type="submit">Book Now</button>
    </form>

    <p id="message"></p>
</section>

<footer>
    <p>© DAM Travels</p>
</footer>

<script src="script.js"></script>
</body>
</html>
